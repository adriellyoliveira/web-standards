<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero - SUA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            text-decoration: none;
            border: none;
            font-family: "Montserrat", sans-serif;
            font-optical-sizing: auto;
        }

        section {
            width: 100%;
            height: 824px;
            padding: 112px 64px;
            border: 2px solid black;
            display: flex;
            justify-content: space-between;
            align-items: center;
            
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            color: black;
            margin-bottom: 24px;
        }

        p {
            font-size: 18px;
            font-weight: 400;
            color: black;
            margin-bottom: 32px;
        }

        .hero-cta {
            display: flex;
            gap: 16px;
        }

        button {
            width: 96px;
            height: 48px;
            color: white;
            font-size: 16px;
            background-color: black;
            border-radius: 10px;
        }

        .btn-secondary {
             background-color: transparent;
             border: 1px solid black;
             color: black;
        }

        img {
            width: 600px;
            height: 600px;
        }
    </style>

</head>
<body>
    
    <section>
        <div class="hero-content">
            <div class="hero-title">
                <h1>Stage Presence in Every Frame</h1>
                <p>A bold visual tribute to SuA’s charisma, confidence, and unforgettable energy. <br> A concept inspired by movement, performance, and the magnetic aura she brings to every stage. </p>
            </div>
            <div class="hero-cta">
                <button>Explore Gallery</button>
                <button class="btn-secondary">View Concept</button>
            </div>
        </div>
        <div class="hero-img">
            <img src="../header/images/sua-flowers.jpg" alt="">
        </div>
    </section>

</body>
</html>
