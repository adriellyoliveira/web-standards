<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sixteen</title>
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/sixteen.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <section id="contact">
        <div class="contact-info">
            <div class="info-text">
                <span>Tagline</span>
                <h2>Contact Us</h2>
                <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Ipsum dolor accusantium vero cumque velit tempora odit excepturi aspernatur ullam reiciendis.</p>
            </div>
            <div class="info-link">
                <div class="link-container">
                    <img src="./assets/images/mail.svg" alt="">
                    <div class="link-text">
                        <p>Email</p>
                        <a href="">email@example.com</a>
                    </div>
                </div>
                <div class="link-container">
                    <img src="./assets/images/call.svg" alt="">
                    <div class="link-text">
                        <p>Phone</p>
                        <a href="">+1 (555) 000-0000</a>
                    </div>
                </div>
                <div class="link-container">
                    <img src="./assets/images/location_on.svg" alt="">
                    <div class="link-text">
                        <p>Office</p>
                        <a href="">123 Sample St, Sydney NSW 2000 AU</a>
                    </div>
                </div>
            </div>
        </div>
        <img src="./assets/images/placeholder-image.svg" alt="">
    </section>
</body>
</html>
