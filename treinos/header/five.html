<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header - Five</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            text-decoration: none;
            border: none;
            font-family: "Montserrat", sans-serif;
            font-optical-sizing: auto;
        }

        header {
            width: 100%;
            height: 900px;
            padding: 64px;
            background-image: url(../header/images/dreamcather-apocalypse.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            align-items: center;
        }

        h1 {
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 24px;
            color: white;
        }

        p {
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 24px;
            color: white;
        }

        .hero-button {
            display: flex;
            gap: 16px;
        }

        button {
            width: 96px;
            height: 48px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
        }

        .btn-youtube {
            background-color: red;
        }

        .btn-spotify {
            background-color: rgb(76, 224, 76);
        }
    </style>
</head>

<body>

    <header>
        <div class="header-content">
            <h1>Dreamcather</h1>
            <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Dolores, exercitationem quo voluptatem eos
                magnam suscipit.</p>
            <div class="hero-button">
                <button class="btn-youtube">Youtube</button>
                <button class="btn-spotify">Spotify</button>
            </div>
        </div>

    </header>

</body>

</html>
